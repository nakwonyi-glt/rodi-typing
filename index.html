<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- PWA 메타태그 -->
  <meta name="theme-color" content="#112240">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="타자연습">
  <meta name="description" content="천지인·베가·나랏글·Qwerty 한국 모바일 자판 타자 연습기">

  <title>손가락 타자 연습</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err));
      });
    }

    // ── PWA 설치 배너 ──────────────────────────────
    let deferredPrompt = null;

    // Android/Chrome: beforeinstallprompt 캐치
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      showInstallBanner('android');
    });

    function showInstallBanner(type) {
      if (sessionStorage.getItem('install-dismissed')) return;
      if (window.matchMedia('(display-mode: standalone)').matches) return; // 이미 설치됨

      const banner = document.createElement('div');
      banner.id = 'install-banner';
      banner.style.cssText = `
        position:fixed; bottom:0; left:0; right:0; z-index:9999;
        background:linear-gradient(135deg,#1E3A5F,#112240);
        color:white; padding:14px 16px; display:flex; align-items:center;
        gap:12px; font-family:sans-serif; box-shadow:0 -4px 20px rgba(0,0,0,0.4);
        border-top:1px solid rgba(255,255,255,0.1);
      `;

      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const msg = isIOS
        ? '📱 홈 화면에 추가하려면 Safari 공유 버튼(⬆)을 누른 뒤 <b>홈 화면에 추가</b>를 선택하세요'
        : '📱 홈 화면에 앱처럼 추가할 수 있어요!';

      banner.innerHTML = `
        <div style="flex:1;font-size:13px;line-height:1.5">${msg}</div>
        ${!isIOS ? '<button id="install-btn" style="background:#3B82F6;border:none;color:white;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap">추가하기</button>' : ''}
        <button id="install-close" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:20px;cursor:pointer;padding:0 4px">✕</button>
      `;

      document.body.appendChild(banner);

      document.getElementById('install-close').onclick = () => {
        banner.remove();
        sessionStorage.setItem('install-dismissed', '1');
      };

      if (!isIOS) {
        document.getElementById('install-btn').onclick = async () => {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
          }
          banner.remove();
        };
      }
    }

    // iOS Safari 감지: 자동으로 배너 표시
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent.toLowerCase());
    const isStandalone = window.navigator.standalone;
    if (isIOS && !isStandalone) {
      setTimeout(() => showInstallBanner('ios'), 3000); // 3초 후 표시
    }
  </script>
</body>
</html>
