  <text x="138" y="222" font-family="serif" font-size="32" fill="rgba(255,255,255,0.5)" text-anchor="middle">ㄱ</text>
  <text x="234" y="222" font-family="serif" font-size="32" fill="rgba(255,255,255,0.5)" text-anchor="middle">ㄴ</text>
