  <text x="138" y="298" font-family="serif" font-size="32" fill="rgba(255,255,255,0.5)" text-anchor="middle">ㄷ</text>
  <text x="234" y="298" font-family="serif" font-size="32" fill="rgba(255,255,255,0.5)" text-anchor="middle">ㄹ</text>
  <text x="332" y="298" font-family="serif" font-size="32" fill="rgba(255,255,255,0.5)" text-anchor="middle">ㅣ</text>
